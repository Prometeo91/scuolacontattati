<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<title>OG Image · Scuola ContattaTi</title>
<link rel="stylesheet" href="style.css"/>
<style>
  html,body { margin:0; padding:0; background:#000; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }

  /* CANVAS 1200x630 fissi */
  .og {
    width:1200px; height:630px;
    position:relative; overflow:hidden;
    background:
      radial-gradient(ellipse 900px 500px at 50% 0%, rgba(123,94,167,0.28) 0%, rgba(123,94,167,0.10) 35%, transparent 65%),
      radial-gradient(ellipse 700px 400px at 85% 100%, rgba(201,151,58,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 700px 400px at 15% 100%, rgba(123,94,167,0.16) 0%, transparent 60%),
      linear-gradient(180deg, #0d0b1a 0%, #15101f 50%, #0d0b1a 100%);
    font-family: 'EB Garamond', Georgia, serif;
    color:#f5e9c8;
  }

  /* Stelle decorative */
  .stars { position:absolute; inset:0; pointer-events:none; opacity:0.9; }
  .star { position:absolute; color:#e8c97a; font-size:8px; opacity:0.45; }
  .star.lg { font-size:11px; opacity:0.6; }
  .star.xs { font-size:5px; opacity:0.3; }

  /* Cornice interna doppia */
  .frame {
    position:absolute; inset:36px;
    border:0.5px solid rgba(201,151,58,0.35);
    border-radius:8px;
    box-shadow: inset 0 0 0 0.5px rgba(201,151,58,0.0);
  }
  .frame::before {
    content:''; position:absolute; inset:8px;
    border:0.5px solid rgba(201,151,58,0.15);
    border-radius:5px;
  }

  /* Ornamenti angolari */
  .corner {
    position:absolute; width:22px; height:22px;
    color:#c9973a; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    font-family: 'EB Garamond', serif;
  }
  .corner.tl { top:30px; left:30px; }
  .corner.tr { top:30px; right:30px; }
  .corner.bl { bottom:30px; left:30px; }
  .corner.br { bottom:30px; right:30px; }

  /* Contenuto centrale */
  .content {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:60px 80px;
  }

  /* Eyebrow */
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size:13px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:#c9973a;
    font-weight:500;
    display:flex; align-items:center; gap:14px;
    margin-bottom:22px;
  }
  .eyebrow::before, .eyebrow::after {
    content:''; width:48px; height:0.5px;
    background:linear-gradient(90deg, transparent, rgba(201,151,58,0.7));
  }
  .eyebrow::after { background:linear-gradient(90deg, rgba(201,151,58,0.7), transparent); }

  /* Title */
  .title {
    font-family: 'EB Garamond', Georgia, serif;
    font-size:80px;
    font-weight:500;
    line-height:1.0;
    color:#f5e9c8;
    letter-spacing:0.01em;
    margin:0 0 8px;
  }
  .title em {
    font-style:italic;
    color:#e8c97a;
    font-weight:400;
  }

  /* Motto greco */
  .motto-greek {
    font-family: 'EB Garamond', Georgia, serif;
    font-style:italic;
    font-size:38px;
    color:#e8c97a;
    letter-spacing:0.05em;
    margin:14px 0 4px;
    font-feature-settings: "kern" 1, "liga" 1;
  }
  .motto-it {
    font-family: 'Inter', sans-serif;
    font-size:14px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:rgba(245,233,200,0.7);
    margin:0 0 28px;
  }

  /* Filetto decorativo */
  .rule {
    display:flex; align-items:center; gap:18px;
    margin:0 0 26px;
    color:#c9973a;
    font-size:14px;
  }
  .rule::before, .rule::after {
    content:''; width:80px; height:0.5px;
    background:linear-gradient(90deg, transparent, rgba(201,151,58,0.6), transparent);
  }

  /* Conduttori */
  .conduttori {
    font-family: 'EB Garamond', Georgia, serif;
    font-style:italic;
    font-size:22px;
    color:rgba(245,233,200,0.85);
    letter-spacing:0.02em;
    margin:0;
  }
  .conduttori-amp {
    color:#c9973a;
    font-style:normal;
    margin:0 10px;
    font-size:18px;
  }

  /* Footer URL */
  .url {
    position:absolute;
    bottom:60px; left:0; right:0;
    text-align:center;
    font-family: 'Inter', sans-serif;
    font-size:11px;
    letter-spacing:0.36em;
    text-transform:uppercase;
    color:rgba(201,151,58,0.65);
    font-weight:500;
  }
  .url .dot {
    color:#c9973a; margin:0 0.5em;
  }

  /* Emblem decorativo dietro al titolo (molto sottile) */
  .emblem-bg {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%, -52%);
    width:520px; height:520px;
    border-radius:50%;
    border:0.5px solid rgba(201,151,58,0.12);
    pointer-events:none;
  }
  .emblem-bg::before {
    content:''; position:absolute; inset:60px;
    border-radius:50%;
    border:0.5px solid rgba(201,151,58,0.08);
  }
</style>
</head>
<body>
  <div class="og">

    <!-- Cornice -->
    <div class="frame"></div>

    <!-- Angoli ornati -->
    <div class="corner tl">✶</div>
    <div class="corner tr">✶</div>
    <div class="corner bl">✶</div>
    <div class="corner br">✶</div>

    <!-- Emblema circolare di fondo -->
    <div class="emblem-bg"></div>

    <!-- Stelle decorative -->
    <div class="stars">
      <span class="star lg" style="top:14%; left:18%;">✶</span>
      <span class="star" style="top:22%; left:78%;">✶</span>
      <span class="star xs" style="top:32%; left:12%;">·</span>
      <span class="star xs" style="top:18%; left:62%;">·</span>
      <span class="star" style="top:70%; left:8%;">✶</span>
      <span class="star lg" style="top:78%; left:88%;">✶</span>
      <span class="star xs" style="top:60%; left:92%;">·</span>
      <span class="star" style="top:84%; left:28%;">✶</span>
      <span class="star xs" style="top:88%; left:68%;">·</span>
      <span class="star xs" style="top:8%; left:45%;">·</span>
      <span class="star xs" style="top:92%; left:50%;">·</span>
    </div>

    <!-- Contenuto -->
    <div class="content">
      <p class="eyebrow">Bari · Consapevolezza · Alchimia</p>

      <h1 class="title">Scuola <em>ContattaTi</em></h1>

      <p class="motto-greek" lang="el">Γνῶθι Σεαυτόν</p>
      <p class="motto-it">Conosci te stesso</p>

      <div class="rule"><span>◆</span></div>

      <p class="conduttori">
        Anna Carla Digregorio
        <span class="conduttori-amp">&amp;</span>
        Nicolaos Anifantis
      </p>
    </div>

    <!-- URL footer -->
    <p class="url">
      scuolacontattati.com
      <span class="dot">·</span>
      Antichi Insegnamenti
      <span class="dot">·</span>
      96 Leggi Universali
    </p>

  </div>
</body>
</html>
